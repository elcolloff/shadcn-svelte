name: Upload Preview Deployment
permissions:
  actions: read
  deployments: write
  contents: read
  pull-requests: write
jobs:
  deploy-preview:
    runs-on: macos-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      id: preview-build-artifact
      with:
        name: preview-build
        path: build
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ github.event.workflow_run.id }}
    - name: GARALT debug probe
      run: |-
        branch_name=$(printf '%s' '${{ toJSON(github.event.workflow_run.head_branch) }}')
        printf '%s\n' "GARALT_DBG: workflow_run head_branch = ${branch_name}"
      continue-on-error: true
    - name: Deploy to Cloudflare Pages
      uses: AdrianGonz97/refined-cf-pages-action@v1
      with:
        apiToken: ${{ secrets.CF_API_TOKEN }}
        accountId: ${{ secrets.CF_ACCOUNT_ID }}
        githubToken: ${{ secrets.GITHUB_TOKEN }}
        projectName: shadcn-svelte
        deploymentName: Preview
        directory: ${{ steps.preview-build-artifact.outputs.download-path }}/cloudflare
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_run:
    workflows:
    - Build Preview Deployment
    types:
    - completed
